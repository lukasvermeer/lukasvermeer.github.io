name: Lighthouse CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse results
        id: format_results
        run: |
          echo "Debug Outputs: ${{ toJSON(steps.lighthouse.outputs) }}"
          ls -R .lighthouseci || echo ".lighthouseci not found"
          
          # Try to use the manifest file if the output is empty
          if [ -f .lighthouseci/manifest.json ]; then
            results_json=$(cat .lighthouseci/manifest.json)
          else
            results_json='${{ steps.lighthouse.outputs.results }}'
          fi
          
          links_json='${{ steps.lighthouse.outputs.links }}'
          
          # Use python to format the table
          python3 -c "
          import json, os, sys
          from urllib.parse import urlparse
          
          def load_json(raw):
              if not raw or raw == 'null': return {}
              try:
                  return json.loads(raw)
              except:
                  # Handle cases where it might be a string representation of a JS object
                  try:
                      # This is a hack for the non-quoted format seen in debug
                      import ast
                      return ast.literal_eval(raw)
                  except:
                      return {}

          results_data = load_json('''$results_json''')
          links_data = load_json('''$links_json''')
          
          if not results_data:
              print('No Lighthouse results data found.')
              with open('comment.md', 'w') as f:
                  f.write('### ⚡️ Lighthouse CI Report\n\nNo results were found. Debug outputs have been logged.')
              sys.exit(0)

          # If it's a manifest (list of runs), we need to extract scores
          # Manifest structure: [ { \"url\": \"...\", \"summary\": { \"performance\": 0.9, ... } } ]
          if isinstance(results_data, list):
              table_data = {}
              for run in results_data:
                  url = run.get('url')
                  summary = run.get('summary')
                  if url and summary:
                      table_data[url] = summary
              results_data = table_data

          body = '### ⚡️ Lighthouse CI Report\n\n'
          body += '| URL | Perf | Acc | B.P. | SEO | PWA | Report |\n'
          body += '| :--- | :---: | :---: | :---: | :---: | :---: | :---: |\n'
          
          for url, scores in results_data.items():
              s = lambda k: round(scores.get(k, 0) * 100) if scores.get(k) is not None else '--'
              link = links_data.get(url, '')
              display_url = urlparse(url).path or '/'
              body += f'| {display_url} | {s(\"performance\")} | {s(\"accessibility\")} | {s(\"bestPractices\")} | {s(\"seo\")} | {s(\"pwa\")} | [🔗]({link}) |\n'
          
          with open('comment.md', 'w') as f:
              f.write(body)
          "
      
      - name: Add Job Summary
        run: cat comment.md >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: comment.md
          comment_tag: lighthouse_report
