name: Lighthouse CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse results
        id: format_results
        run: |
          echo "Processing Lighthouse reports..."
          ls .lighthouseci/lhr-*.json || echo "No reports found in .lighthouseci/"
          
          links_json='${{ steps.lighthouse.outputs.links }}'
          
          # Use python to format the table
          python3 -c "
          import json, os, sys, glob
          from urllib.parse import urlparse
          
          links_data = {}
          try:
              links_raw = '''$links_json'''.strip()
              if links_raw and links_raw != 'null':
                  links_data = json.loads(links_raw)
          except Exception as e:
              print(f'Error parsing links JSON: {e}')

          table_data = {}
          reports = glob.glob('.lighthouseci/lhr-*.json')
          
          for report_path in reports:
              try:
                  with open(report_path, 'r') as f:
                      data = json.load(f)
                      url = data.get('finalDisplayedUrl') or data.get('finalUrl')
                      cats = data.get('categories', {})
                      # LH categories are performance, accessibility, best-practices, seo, pwa
                      summary = {
                          'perf': cats.get('performance', {}).get('score'),
                          'acc': cats.get('accessibility', {}).get('score'),
                          'bp': cats.get('best-practices', {}).get('score'),
                          'seo': cats.get('seo', {}).get('score'),
                          'pwa': cats.get('pwa', {}).get('score'),
                      }
                      if url:
                          table_data[url] = summary
              except Exception as e:
                  print(f'Error processing {report_path}: {e}')

          if not table_data:
              print('No Lighthouse results data found.')
              with open('comment.md', 'w') as f:
                  f.write('### ⚡️ Lighthouse CI Report\n\nNo results were found. Please check the action logs.')
              sys.exit(0)

          body = '### ⚡️ Lighthouse CI Report\n\n'
          body += '| URL | Perf | Acc | B.P. | SEO | PWA | Report |\n'
          body += '| :--- | :---: | :---: | :---: | :---: | :---: | :---: |\n'
          
          for url in sorted(table_data.keys()):
              scores = table_data[url]
              fmt = lambda v: str(round(v * 100)) if v is not None else '--'
              link = links_data.get(url, '')
              display_url = urlparse(url).path or '/'
              body += f'| {display_url} | {fmt(scores[\"perf\"])} | {fmt(scores[\"acc\"])} | {fmt(scores[\"bp\"])} | {fmt(scores[\"seo\"])} | {fmt(scores[\"pwa\"])} | [🔗]({link}) |\n'
          
          with open('comment.md', 'w') as f:
              f.write(body)
          "
      
      - name: Add Job Summary
        run: cat comment.md >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: comment.md
          comment_tag: lighthouse_report
